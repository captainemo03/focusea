<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Focusea compass badge</title>
  <desc id="desc">A clean maritime compass badge with a focused F monogram, route line and ocean wave.</desc>
  <defs>
    <radialGradient id="badgeGlow" cx="48%" cy="38%" r="68%">
      <stop stop-color="#183c76"/>
      <stop offset=".48" stop-color="#0b1a43"/>
      <stop offset="1" stop-color="#060818"/>
    </radialGradient>
    <linearGradient id="ring" x1="54" y1="38" x2="209" y2="218" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8f8cff"/>
      <stop offset=".45" stop-color="#36d7ff"/>
      <stop offset="1" stop-color="#28f0c6"/>
    </linearGradient>
    <linearGradient id="mark" x1="79" y1="69" x2="174" y2="182" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset=".52" stop-color="#d9fdff"/>
      <stop offset="1" stop-color="#8fffea"/>
    </linearGradient>
    <linearGradient id="wave" x1="62" y1="154" x2="200" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset=".38" stop-color="#52e8ff"/>
      <stop offset="1" stop-color="#28f0c6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="13" flood-color="#030514" flood-opacity=".5"/>
    </filter>
    <filter id="aura" x="-28%" y="-28%" width="156%" height="156%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="116" fill="#050719"/>
  <circle cx="128" cy="128" r="109" fill="url(#badgeGlow)"/>
  <circle cx="128" cy="128" r="108" fill="none" stroke="url(#ring)" stroke-width="6"/>
  <circle cx="128" cy="128" r="88" fill="none" stroke="#b8fbff" stroke-width="1.5" opacity=".16"/>
  <circle cx="128" cy="128" r="62" fill="none" stroke="#8f8cff" stroke-width="1.5" opacity=".12"/>

  <g opacity=".9">
    <path d="M128 26v23M128 207v23M26 128h23M207 128h23" fill="none" stroke="#b8fbff" stroke-linecap="round" stroke-width="5"/>
    <path d="M65 65l13 13M178 178l13 13M191 65l-13 13M78 178l-13 13" fill="none" stroke="#8f8cff" stroke-linecap="round" stroke-width="4" opacity=".68"/>
  </g>

  <g filter="url(#aura)" opacity=".34">
    <circle cx="162" cy="116" r="19" fill="#28f0c6"/>
    <path d="M61 174c26-21 52-21 78 0 22 17 43 17 66-2" fill="none" stroke="#28f0c6" stroke-linecap="round" stroke-width="16"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M91 76h83M91 76v103M91 120h62" fill="none" stroke="#07122c" stroke-linecap="round" stroke-linejoin="round" stroke-width="26" opacity=".55"/>
    <path d="M91 74h83M91 74v105M91 119h62" fill="none" stroke="url(#mark)" stroke-linecap="round" stroke-linejoin="round" stroke-width="18"/>
    <circle cx="163" cy="119" r="18" fill="#07122c" stroke="url(#ring)" stroke-width="6"/>
    <circle cx="163" cy="119" r="5" fill="#ffffff"/>
    <path d="M128 43l13 31-13 12-13-12 13-31Z" fill="#ffffff"/>
    <path d="M128 43l13 31-13 12-13-12 13-31Z" fill="none" stroke="#28f0c6" stroke-linejoin="round" stroke-width="3"/>
    <path d="M62 174c27-22 52-22 79 0 22 18 42 18 64-2" fill="none" stroke="#07122c" stroke-linecap="round" stroke-width="15" opacity=".5"/>
    <path d="M62 174c27-22 52-22 79 0 22 18 42 18 64-2" fill="none" stroke="url(#wave)" stroke-linecap="round" stroke-width="9"/>
  </g>
</svg>
